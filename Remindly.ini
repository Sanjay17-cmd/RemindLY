; ╔══════════════════════════════════════════════════════╗
; ║  Remindly.ini — Rainmeter Skin                      ║
; ║  Shows your top tasks from GitHub Gist              ║
; ║                                                     ║
; ║  SETUP:                                             ║
; ║  1. Edit Variables section below                    ║
; ║  2. Set GistID and Token                            ║
; ║  3. Load skin in Rainmeter                          ║
; ╚══════════════════════════════════════════════════════╝

[Rainmeter]
Update=30000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=12,12,12,220
BackgroundMode=1

[Metadata]
Name=Remindly
Author=You
Information=Shows your Remindly tasks from GitHub Gist
License=Public Domain
Version=1.0

; ── EDIT THESE ──────────────────────────────────────────
[Variables]
GistID=YOUR_GIST_ID_HERE
Token=YOUR_GITHUB_TOKEN_HERE
FontFace=Courier New
AccentColor=200,245,90
TextColor=240,240,240
MutedColor=100,100,100
BgColor=12,12,12,220
Width=320
FontSize=11
; ────────────────────────────────────────────────────────

[Background]
Meter=Image
W=#Width#
H=500
SolidColor=#BgColor#
X=0
Y=0

[MeasureFetch]
Measure=WebParser
URL=https://api.github.com/gists/#GistID#
Header=Authorization: token #Token#
Header2=Accept: application/vnd.github.v3+json
StringIndex=1
RegExp=(?siU)"remindly\.json".*?"content":\s*"(.*?)"(?=[,}])
UpdateRate=1
DecodeCharacterReference=1

[MeasureContent]
Measure=WebParser
URL=[MeasureFetch]
StringIndex=1
RegExp=(?siU)(.*)
UpdateRate=1

; Parse up to 8 tasks from JSON
; Each task: {"id":...,"text":"...","priority":"...","done":...}

[MeasureTask1]
Measure=WebParser
URL=[MeasureFetch]
StringIndex=1
RegExp=(?siU)\{[^\}]*"done"\s*:\s*false[^\}]*"text"\s*:\s*"([^"]+)"[^\}]*"priority"\s*:\s*"([^"]+)"
StringIndex=1
UpdateRate=1

[MeasureTask1P]
Measure=WebParser
URL=[MeasureFetch]
StringIndex=1
RegExp=(?siU)\{[^\}]*"done"\s*:\s*false[^\}]*"text"\s*:\s*"([^"]+)"[^\}]*"priority"\s*:\s*"([^"]+)"
StringIndex=2
UpdateRate=1

; ── Header ──────────────────────────────────────────────
[MeterHeader]
Meter=String
X=18
Y=18
FontColor=#AccentColor#
FontFace=#FontFace#
FontSize=13
FontWeight=700
AntiAlias=1
Text=remindly
StringAlign=Left

[MeterDivider]
Meter=Image
X=18
Y=40
W=[#Width# - 36]
H=1
SolidColor=40,40,40,255
DynamicVariables=1

; ── Task display (static parsed lines) ──────────────────
; Since Rainmeter WebParser is limited, we fetch the raw
; Gist content and display via regex matches.

[MeasureRaw]
Measure=WebParser
URL=https://api.github.com/gists/#GistID#
Header=Authorization: token #Token#
Header2=Accept: application/vnd.github.v3+json
RegExp=(?siU)"content":\s*"(.*?[^\\])"
StringIndex=1
UpdateRate=2
DecodeCharacterReference=1

[MeasureT1]
Measure=WebParser
URL=[MeasureRaw]
RegExp=(?siU)"text":"([^"]+)","priority":"([^"]+)","[^"]*":[^,]*,"done":false
StringIndex=1
UpdateRate=1

[MeasureT1Pri]
Measure=WebParser
URL=[MeasureRaw]
RegExp=(?siU)"text":"([^"]+)","priority":"([^"]+)","[^"]*":[^,]*,"done":false
StringIndex=2
UpdateRate=1

[MeasureT2]
Measure=WebParser
URL=[MeasureRaw]
RegExp=(?siU)"text":"([^"]+)","priority":"([^"]+)","[^"]*":[^,]*,"done":false
Occurrence=2
StringIndex=1
UpdateRate=1

[MeasureT2Pri]
Measure=WebParser
URL=[MeasureRaw]
RegExp=(?siU)"text":"([^"]+)","priority":"([^"]+)","[^"]*":[^,]*,"done":false
Occurrence=2
StringIndex=2
UpdateRate=1

[MeasureT3]
Measure=WebParser
URL=[MeasureRaw]
RegExp=(?siU)"text":"([^"]+)","priority":"([^"]+)","[^"]*":[^,]*,"done":false
Occurrence=3
StringIndex=1
UpdateRate=1

[MeasureT3Pri]
Measure=WebParser
URL=[MeasureRaw]
RegExp=(?siU)"text":"([^"]+)","priority":"([^"]+)","[^"]*":[^,]*,"done":false
Occurrence=3
StringIndex=2
UpdateRate=1

[MeasureT4]
Measure=WebParser
URL=[MeasureRaw]
RegExp=(?siU)"text":"([^"]+)","priority":"([^"]+)","[^"]*":[^,]*,"done":false
Occurrence=4
StringIndex=1
UpdateRate=1

[MeasureT4Pri]
Measure=WebParser
URL=[MeasureRaw]
RegExp=(?siU)"text":"([^"]+)","priority":"([^"]+)","[^"]*":[^,]*,"done":false
Occurrence=4
StringIndex=2
UpdateRate=1

[MeasureT5]
Measure=WebParser
URL=[MeasureRaw]
RegExp=(?siU)"text":"([^"]+)","priority":"([^"]+)","[^"]*":[^,]*,"done":false
Occurrence=5
StringIndex=1
UpdateRate=1

; ── Meter: Task rows ─────────────────────────────────────
[MeterTask1]
Meter=String
MeasureName=MeasureT1
X=18
Y=52
W=[#Width# - 36]
H=22
FontColor=#TextColor#
FontFace=#FontFace#
FontSize=#FontSize#
AntiAlias=1
ClipString=1
StringAlign=Left
DynamicVariables=1
IfMatch=^$
IfMatchAction=[!HideMeter MeterTask1]
Postfix= [MeasureT1Pri]

[MeterTask2]
Meter=String
MeasureName=MeasureT2
X=18
Y=76
W=[#Width# - 36]
H=22
FontColor=#TextColor#
FontFace=#FontFace#
FontSize=#FontSize#
AntiAlias=1
ClipString=1
StringAlign=Left
DynamicVariables=1

[MeterTask3]
Meter=String
MeasureName=MeasureT3
X=18
Y=100
W=[#Width# - 36]
H=22
FontColor=#TextColor#
FontFace=#FontFace#
FontSize=#FontSize#
AntiAlias=1
ClipString=1
StringAlign=Left
DynamicVariables=1

[MeterTask4]
Meter=String
MeasureName=MeasureT4
X=18
Y=124
W=[#Width# - 36]
H=22
FontColor=#TextColor#
FontFace=#FontFace#
FontSize=#FontSize#
AntiAlias=1
ClipString=1
StringAlign=Left
DynamicVariables=1

[MeterTask5]
Meter=String
MeasureName=MeasureT5
X=18
Y=148
W=[#Width# - 36]
H=22
FontColor=#MutedColor#
FontFace=#FontFace#
FontSize=#FontSize#
AntiAlias=1
ClipString=1
StringAlign=Left
DynamicVariables=1

[MeterDivider2]
Meter=Image
X=18
Y=178
W=[#Width# - 36]
H=1
SolidColor=30,30,30,255
DynamicVariables=1

[MeterLastSync]
Meter=String
X=18
Y=186
FontColor=#MutedColor#
FontFace=#FontFace#
FontSize=9
AntiAlias=1
Text=updated every 30s · remindly
StringAlign=Left
