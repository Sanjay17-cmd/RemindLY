<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Remindly Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 12px 14px;
      min-height: 100vh;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e1e1e;
    }

    .logo {
      font-size: 12px;
      font-weight: bold;
      color: #c8f55a;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .count {
      font-size: 10px;
      color: #555;
    }

    .task {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #141414;
    }

    .task:last-child { border-bottom: none; }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .dot.high { background: #ff5252; }
    .dot.med  { background: #ffb347; }
    .dot.low  { background: #c8f55a; }

    .task-text {
      font-size: 12px;
      color: #e0e0e0;
      line-height: 1.4;
      flex: 1;
      /* clamp to 2 lines */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty {
      text-align: center;
      padding: 24px 0;
      color: #333;
      font-size: 12px;
    }

    .footer {
      margin-top: 10px;
      font-size: 9px;
      color: #2a2a2a;
      text-align: right;
    }

    .setup {
      padding: 16px 0;
      color: #555;
      font-size: 11px;
      line-height: 1.7;
      text-align: center;
    }
    .setup span { color: #c8f55a; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">remindly</div>
  <div class="count" id="count"></div>
</div>

<div id="list"></div>
<div class="footer" id="footer"></div>

<script>
  const GIST_KEY = 'remindly_gist_id';
  const TOKEN_KEY = 'remindly_token';
  const TASKS_KEY = 'remindly_tasks';

  const list   = document.getElementById('list');
  const count  = document.getElementById('count');
  const footer = document.getElementById('footer');

  function render(tasks) {
    const open = tasks.filter(t => !t.done);

    count.textContent = open.length + ' open';

    if (open.length === 0) {
      list.innerHTML = '<div class="empty">✦ all done!</div>';
      return;
    }

    // Sort: high first
    const pw = { high: 0, med: 1, low: 2 };
    open.sort((a, b) => pw[a.priority] - pw[b.priority]);

    // Show max 6 tasks to fit widget
    list.innerHTML = open.slice(0, 6).map(t => `
      <div class="task">
        <div class="dot ${t.priority}"></div>
        <div class="task-text">${esc(t.text)}</div>
      </div>
    `).join('');

    footer.textContent = 'updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function load() {
    // 1. Try localStorage first (instant)
    const local = localStorage.getItem(TASKS_KEY);
    if (local) render(JSON.parse(local));

    // 2. Try fetching from Gist for fresh data
    const gistId = localStorage.getItem(GIST_KEY);
    const token  = localStorage.getItem(TOKEN_KEY);

    if (!gistId || !token) {
      if (!local) {
        list.innerHTML = `<div class="setup">
          Open the <span>remindly app</span> first<br>
          and connect your GitHub token.<br>
          Then come back here!
        </div>`;
      }
      return;
    }

    try {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: {
          Authorization: `token ${token}`,
          Accept: 'application/vnd.github.v3+json'
        }
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      const content = data.files?.['remindly.json']?.content;
      if (content) {
        const tasks = JSON.parse(content);
        localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
        render(tasks);
      }
    } catch (e) {
      // already showing local, that's fine
    }
  }

  load();
</script>
</body>
</html>
